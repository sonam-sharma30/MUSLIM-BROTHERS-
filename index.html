<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Brothers Network</title>
    <meta name="description" content="Secure Muslim brotherhood community platform">
    <link href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMTYiIGZpbGw9IiM0QjgyRkYiLz4KPHBhdGggZD0iTTE2IDQuNUwxMiAxMkwxMCAxNkwxMiAyMGw0IDUuNUwxNiAxOUwxOCAyMGw0IDUuNUwxNiAyNUwxMiAyMEwxMCAxNkwxMiAxMUwxNiA0LjVaIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4K" rel="icon">
    <style>
        :root{--primary:#1e40af;--secondary:#3b82f6;--accent:#10b981;--bg:#f8fafc;--card:#ffffff;--text:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:"0 10px 25px rgba(0,0,0,0.1)";--radius:"16px"}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--text);line-height:1.6;overflow-x:hidden}
        .container{background:var(--card);backdrop-filter:blur(20px);padding:2.5rem;border-radius:var(--radius);box-shadow:var(--shadow);max-width:440px;width:calc(100% - 2rem);border:1px solid rgba(255,255,255,.2);animation:fadeInUp .7s cubic-bezier(.25,.46,.45,.94)}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        .header{text-align:center;margin-bottom:2.5rem}
        .header h1{font-size:clamp(1.8rem,5vw,2.5rem);background:linear-gradient(135deg,#ffffff,var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800;margin-bottom:.5rem;position:relative}
        .header h1::after{content:'';display:block;width:60px;height:4px;background:linear-gradient(135deg,var(--accent),#059669);margin:8px auto 0;border-radius:2px}
        .header p{color:var(--text-muted);font-size:1.1rem;line-height:1.5}
        .form-group{margin-bottom:2rem}
        label{display:block;margin-bottom:.75rem;font-weight:600;color:var(--text);font-size:.95rem}
        input{width:100%;padding:16px 20px;border:2px solid var(--border);border-radius:12px;font-size:16px;transition:all .3s cubic-bezier(.4,0,.2,1);background:var(--bg);color:var(--text)}
        input:focus{outline:none;border-color:var(--secondary);box-shadow:0 0 0 4px rgba(59,130,246,.1);transform:translateY(-2px)}
        input::placeholder{color:var(--text-muted);opacity:.7}
        .location-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);padding:1.75rem;border-radius:16px;border:2px solid #bbf7d0;margin-bottom:2rem;text-align:center;position:relative;overflow:hidden}
        .location-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),#059669)}
        .location-card label{margin-bottom:1rem;display:block;font-weight:600;color:#166534}
        #locationBtn{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none;padding:16px 28px;border-radius:12px;cursor:pointer;font-size:16px;font-weight:600;width:100%;transition:all .3s;box-shadow:0 8px 25px rgba(16,185,129,.3);position:relative;overflow:hidden}
        #locationBtn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 12px 35px rgba(16,185,129,.4)}
        #locationBtn:disabled{opacity:.6;cursor:not-allowed;transform:none;background:#6b7280}
        #locationStatus{margin-top:1rem;font-weight:500;min-height:28px;color:#166534}
        #joinBtn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;padding:18px;border-radius:16px;cursor:pointer;font-size:18px;font-weight:700;width:100%;transition:all .3s;box-shadow:0 12px 35px rgba(30,64,175,.4)}
        #joinBtn:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 20px 45px rgba(30,64,175,.5)}
        #joinBtn:disabled{opacity:.6;cursor:not-allowed;transform:none;background:#9ca3af}
        .progress{display:none;text-align:center;margin:2rem 0;padding:1.5rem;background:var(--bg);border-radius:12px}
        .spinner{display:inline-block;width:24px;height:24px;border:3px solid #f3f3f3;border-top:3px solid var(--secondary);border-radius:50%;animation:spin 1s linear infinite;margin-right:12px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .success{display:none;text-align:center;padding:2rem;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:16px;border:2px solid #bbf7d0;margin-top:1rem;color:#166534;font-weight:600}
        @media(max-width:480px){.container{padding:2rem 1.5rem;margin:1rem}}
    </style>
</head>
<body>
    <main class="container">
        <header class="header">
            <h1>🤝 Muslim Brothers</h1>
            <p>Join our <strong>verified brotherhood network</strong><br><small>Local verification required for trusted members</small></p>
        </header>

        <form id="brotherhoodForm">
            <div class="form-group">
                <label for="fullName">👤 Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your complete name" required maxlength="60">
            </div>

            <div class="form-group">
                <label for="phone">📱 WhatsApp/Phone</label>
                <input type="tel" id="phone" placeholder="+91 98765 43210" required pattern="[+]?[0-9\s\-\(\)]{10,16}">
            </div>

            <div class="form-group">
                <label for="insta">📸 Instagram Handle</label>
                <input type="text" id="insta" placeholder="@yourusername" required maxlength="30">
            </div>

            <div class="location-card">
                <label>📍 Local Verification</label>
                <button type="button" id="getLocation">🔐 Verify My Exact Location</button>
                <div id="locationStatus"></div>
                <small style="color:#4b5563;font-size:.85rem;margin-top:.75rem;display:block">Precise location confirms local brotherhood membership</small>
            </div>

            <button type="submit" id="joinBtn" disabled>Join Secure Network →</button>
        </form>

        <div id="progress" class="progress">
            <div class="spinner"></div>
            Verifying brotherhood membership...
        </div>

        <div id="successMsg" class="success">
            ✅ <strong>Welcome Brother!</strong><br>Your secure membership is now active.
        </div>
    </main>
    <script src="script.js"></script>
</body>
  </html>
